<!DOCTYPE html>
<html>
<head>
    <title>Logs</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="top-right-buttons">
    {% if session.get('user') %}
        <span style="margin-right:10px; font-weight:bold;">{{ session['user'] }}</span>
        <a href="/logout"><button class="logout-btn">Logout</button></a>
    {% endif %}
</div>

<div class="dashboard-container">

    <h2>📜 Activity Logs</h2>

    <pre style="text-align:left;">{{ logs }}</pre>

    <a href="/"><button class="dashboard-btn" style="margin-top:20px;">Back to Home</button></a>

</div>

</body>
</html>
