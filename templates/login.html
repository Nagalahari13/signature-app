<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>


<div class="dashboard-container" style="max-width: 400px;">

    <h2>🔐 Login</h2>

    <form action="/login" method="POST" class="login-form">

        <input type="text" name="username" placeholder="Enter Username" required class="input-box">
        <br><br>

        <input type="password" name="password" placeholder="Enter Password" required class="input-box">
        <br><br>

        <button class="dashboard-btn" style="width:100%;">Login</button>

    </form>
</div>

</body>
</html>
